<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>电力安规 · 逐题练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 920px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.08);
            padding: 24px 28px 40px;
            margin: 0 auto;
            transition: all 0.2s;
        }
        @media (max-width: 640px) {
            body {
                padding: 10px;
            }
            .app {
                padding: 16px 14px 32px;
                border-radius: 20px;
            }
        }

        /* header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 14px;
            border-bottom: 2px solid #eef2f6;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(145deg, #0b2b4a, #1a4b6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .brand {
            font-size: 15px;
            color: #64748b;
            background: #f1f4f9;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 0.3px;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
        }
        .header .brand span {
            color: #2563eb;
            font-weight: 600;
        }
        @media (max-width: 500px) {
            .header h1 {
                font-size: 19px;
            }
            .header .brand {
                font-size: 13px;
                padding: 4px 14px;
            }
        }

        /* stats */
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px 20px;
            margin: 6px 0 22px 0;
            font-size: 14px;
            border: 1px solid #e9edf2;
        }
        .stats .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats .stat-item .num {
            font-weight: 700;
            color: #0f2b44;
            font-size: 16px;
            min-width: 20px;
        }
        .stats .stat-item .label {
            color: #475569;
        }
        .stats .stat-item.done .num {
            color: #16a34a;
        }
        .stats .stat-item.wrong .num {
            color: #dc2626;
        }
        .stats .stat-item.pending .num {
            color: #f59e0b;
        }

        /* section title */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 28px 0 16px 0;
            padding-left: 12px;
            border-left: 5px solid #2563eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .badge {
            font-size: 13px;
            font-weight: 500;
            background: #e9edf2;
            color: #334155;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .section-title .badge.fill {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .section-title .badge.choice {
            background: #d1fae5;
            color: #059669;
        }
        .section-title .badge.judge {
            background: #fef3c7;
            color: #d97706;
        }
        @media (max-width: 480px) {
            .section-title {
                font-size: 17px;
                margin-top: 22px;
            }
        }

        /* question card */
        .q-card {
            background: #ffffff;
            border: 1px solid #eef2f6;
            border-radius: 16px;
            padding: 18px 22px 20px;
            margin-bottom: 14px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
            position: relative;
        }
        .q-card:hover {
            border-color: #d0d8e3;
        }
        .q-card .q-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .q-card .q-number {
            font-weight: 700;
            color: #2563eb;
            font-size: 15px;
            background: #eff6ff;
            padding: 0 10px;
            border-radius: 30px;
            line-height: 26px;
            min-width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        .q-card .q-text {
            font-size: 15.5px;
            line-height: 1.7;
            color: #0b1e2e;
            font-weight: 500;
            flex: 1;
        }
        .q-card .q-text .fill-input {
            display: inline-block;
            width: 140px;
            max-width: 70%;
            padding: 4px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            color: #0b2b4a;
            background: #fafcff;
            transition: border-color 0.25s, box-shadow 0.2s;
            vertical-align: middle;
            margin: 0 4px 6px 0;
            height: 40px;
            font-family: inherit;
        }
        .q-card .q-text .fill-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .q-card .q-text .fill-input.correct {
            border-color: #16a34a;
            background: #f0fdf4;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
        }
        .q-card .q-text .fill-input.wrong {
            border-color: #dc2626;
            background: #fef2f2;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.10);
        }
        .q-card .q-text .fill-input:disabled {
            opacity: 0.9;
            cursor: not-allowed;
        }
        @media (max-width: 480px) {
            .q-card .q-text .fill-input {
                width: 110px;
                font-size: 14px;
                height: 38px;
            }
        }

        /* options */
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-top: 12px;
        }
        .options .opt {
            padding: 7px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14.5px;
            font-weight: 500;
            color: #1e293b;
            background: #fafcff;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .options .opt:hover:not(.disabled) {
            border-color: #94a3b8;
            background: #f1f4f9;
        }
        .options .opt.selected {
            border-color: #2563eb;
            background: #eff6ff;
            color: #1d4ed8;
        }
        .options .opt.correct {
            border-color: #16a34a;
            background: #f0fdf4;
            color: #15803d;
        }
        .options .opt.wrong {
            border-color: #dc2626;
            background: #fef2f2;
            color: #b91c1c;
        }
        .options .opt.disabled {
            cursor: default;
            opacity: 0.85;
        }
        .options .opt .tag {
            font-size: 12px;
            opacity: 0.7;
            font-weight: 400;
        }

        /* judge buttons */
        .judge-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 12px;
        }
        .judge-btns .jbtn {
            padding: 7px 28px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            background: #fafcff;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            min-width: 80px;
            text-align: center;
        }
        .judge-btns .jbtn:hover:not(.disabled) {
            border-color: #94a3b8;
            background: #f1f4f9;
        }
        .judge-btns .jbtn.selected-true {
            border-color: #16a34a;
            background: #f0fdf4;
            color: #15803d;
        }
        .judge-btns .jbtn.selected-false {
            border-color: #dc2626;
            background: #fef2f2;
            color: #b91c1c;
        }
        .judge-btns .jbtn.correct {
            border-color: #16a34a;
            background: #f0fdf4;
            color: #15803d;
        }
        .judge-btns .jbtn.wrong {
            border-color: #dc2626;
            background: #fef2f2;
            color: #b91c1c;
        }
        .judge-btns .jbtn.disabled {
            cursor: default;
            opacity: 0.85;
        }
        .judge-btns .jbtn .icon {
            font-size: 18px;
            margin-right: 4px;
        }

        /* explanation */
        .explanation {
            margin-top: 14px;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 12px;
            border-left: 4px solid #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
            display: none;
        }
        .explanation.show {
            display: block;
        }
        .explanation .exp-label {
            font-weight: 600;
            color: #475569;
            margin-right: 6px;
        }
        .explanation .exp-answer {
            font-weight: 600;
            color: #1d4ed8;
        }
        .explanation .exp-answer.correct-ans {
            color: #16a34a;
        }
        .explanation .exp-answer.wrong-ans {
            color: #dc2626;
        }

        /* single submit button */
        .single-actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
        }
        .btn-confirm-single {
            background: #2563eb;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
            border: 1px solid #1d4ed8;
            letter-spacing: 0.3px;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-confirm-single:hover {
            background: #1d4ed8;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }
        .btn-confirm-single:active {
            transform: scale(0.96);
        }
        .btn-confirm-single:disabled {
            background: #94a3b8;
            border-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .btn-confirm-single .icon {
            margin-right: 6px;
        }

        .status-badge {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            background: #f1f5f9;
            color: #475569;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-badge.correct {
            background: #dcfce7;
            color: #15803d;
        }
        .status-badge.wrong {
            background: #fee2e2;
            color: #b91c1c;
        }

        /* missing highlight */
        .q-card.missing {
            border-color: #f59e0b;
            background: #fffbeb;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.25);
        }
        .q-card.missing .q-number {
            background: #fef3c7;
            color: #d97706;
        }

        /* submit area */
        .submit-area {
            margin-top: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
            border-top: 2px solid #eef2f6;
            padding-top: 24px;
        }
        .submit-area .left {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            align-items: center;
        }
        .submit-area .score {
            font-size: 20px;
            font-weight: 700;
            color: #0f2b44;
        }
        .submit-area .score .num {
            color: #2563eb;
            font-size: 26px;
        }
        .submit-area .score .total {
            color: #64748b;
            font-weight: 400;
            font-size: 18px;
        }
        .btn-submit {
            background: #2563eb;
            border: none;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            padding: 12px 40px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            letter-spacing: 0.5px;
            border: 1px solid #1d4ed8;
            min-height: 52px;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            background: #94a3b8;
            border-color: #94a3b8;
            box-shadow: none;
            cursor: default;
        }
        .btn-reset {
            background: #f1f4f9;
            border: 1px solid #d0d8e3;
            color: #334155;
            font-size: 15px;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
            min-height: 44px;
        }
        .btn-reset:hover {
            background: #e5e9ef;
        }
        @media (max-width: 600px) {
            .submit-area {
                flex-direction: column;
                align-items: stretch;
            }
            .submit-area .left {
                justify-content: center;
            }
            .btn-submit {
                width: 100%;
                text-align: center;
                padding: 14px;
            }
            .btn-reset {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
        }

        /* toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast .highlight {
            color: #fbbf24;
        }
        @media (max-width: 480px) {
            .toast {
                font-size: 13px;
                padding: 12px 20px;
                bottom: 20px;
            }
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            border-top: 1px solid #eef2f6;
            padding-top: 20px;
            letter-spacing: 0.3px;
        }
        .footer strong {
            color: #475569;
            font-weight: 600;
        }

        /* print */
        @media print {
            .btn-submit,
            .btn-reset,
            .btn-confirm-single,
            .toast {
                display: none !important;
            }
            .q-card {
                break-inside: avoid;
                border-color: #ccc;
            }
            .app {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- header -->
        <div class="header">
            <h1>⚡ 电力安规 · 逐题练</h1>
            <div class="brand">✧ 由 <span>沐春风</span> 制作</div>
        </div>

        <!-- stats -->
        <div class="stats" id="stats">
            <div class="stat-item"><span class="label">📝 总题</span><span class="num" id="totalCount">0</span></div>
            <div class="stat-item done"><span class="label">✅ 已答</span><span class="num" id="doneCount">0</span></div>
            <div class="stat-item wrong"><span class="label">❌ 错误</span><span class="num" id="wrongCount">0</span></div>
            <div class="stat-item pending"><span class="label">⏳ 未答</span><span class="num" id="pendingCount">0</span></div>
        </div>

        <!-- 题目容器 -->
        <div id="questionsContainer"></div>

        <!-- submit -->
        <div class="submit-area">
            <div class="left">
                <div class="score">得分：<span class="num" id="scoreNum">0</span> <span class="total">/ <span id="totalScore">0</span></span></div>
                <button class="btn-reset" id="resetBtn">🔄 重新答题</button>
            </div>
            <button class="btn-submit" id="submitBtn">📨 提交全部未答题</button>
        </div>

        <div class="footer">
            <strong>由沐春风制作</strong> · 电力安全规程 · 逐题提交，即时反馈
        </div>
    </div>

    <!-- toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  数据 (与之前保持一致)
        // ============================================================

        const fillData = [{
            id: 1,
            question: '电力线路检修带电导线电压在 10-35kV 时，距离检修的线路的安全距离为 ___ m。',
            answers: ['1.0', '1'],
            explanation: '安规 10～35kV 不停电检修安全距离 1m。'
        }, {
            id: 2,
            question: '两根绝缘导线穿于同一根管时，管内径不应小于两根导线外径之和的 ___ 倍。',
            answers: ['1.5', '1.5倍'],
            explanation: '规范布线管径最低要求。'
        }, {
            id: 3,
            question: '封闭母线水平敷设的支持点距不宜大于 ___ m。',
            answers: ['1.5', '1.5m'],
            explanation: '封闭母线水平敷设支持点距要求。'
        }, {
            id: 4,
            question: '电动机不频繁启动时，不宜低于额定电压的 ___ %。',
            answers: ['85', '85%'],
            explanation: '电机启动压降规范，频繁启动 90%，不频繁 85%。'
        }, {
            id: 5,
            question: 'GIS 充气柜采用绝缘灭弧性能优异的 ___ 气体作为绝缘和灭弧介质。',
            answers: ['SF₆', '六氟化硫', 'SF6'],
            explanation: '六氟化硫 (SF₆) 具有优异的绝缘和灭弧性能。'
        }, {
            id: 6,
            question: '避雷器主要用于电气设备 ___ 保护。',
            answers: ['雷电过电压', '雷击', '雷电过电压（雷击）'],
            explanation: '避雷器用于防护雷电过电压（雷击）。'
        }, {
            id: 7,
            question: '电流表又称 ___ ，电流表是用来测量电流的大小，单位为安培 (A)。',
            answers: ['安培表'],
            explanation: '电流表又称安培表。'
        }, {
            id: 8,
            question: 'RTU 是电力 SCADA 系统中的被控站主要功能包括：遥测、遥控、 ___ 。',
            answers: ['遥信'],
            explanation: '三遥基础：遥测采集量值、遥信采集开关、遥控分合闸。'
        }, {
            id: 9,
            question: '容易发生火花、温度过高的电气设备，必须装在地面 ___ m 以上的位置。',
            answers: ['2.5', '2.5m'],
            explanation: '电气设备安装高度要求 ≥ 2.5m。'
        }, {
            id: 10,
            question: '每台油量为 ___ kg 及以上的三相变压器，应装设在单独的变压器室内。',
            answers: ['1000', '1000kg'],
            explanation: '油量 1000kg 及以上变压器应单独设室。'
        }, {
            id: 11,
            question: '拉线安装，拉线由多根组成时，每根受力应 ___ 。',
            answers: ['均匀一致', '均匀'],
            explanation: '多根拉线受力应均匀一致。'
        }, {
            id: 12,
            question: '避雷针应平直，焊接应 ___ ，不应有裂缝、气孔及脱焊等缺陷。',
            answers: ['饱满平整', '饱满'],
            explanation: '避雷针焊接应饱满平整，无缺陷。'
        }, {
            id: 13,
            question: '杆上避雷器的安装，1～10kV 引线相间距离不小于 ___ mm。',
            answers: ['350', '350mm'],
            explanation: '1～10kV 引线相间距离 ≥ 350mm。'
        }, {
            id: 14,
            question: '螺栓的穿入方向， ___ 方向者由内向外。',
            answers: ['水平'],
            explanation: '水平方向螺栓由内向外穿入。'
        }, {
            id: 15,
            question: '1kV 电缆的绝缘电阻不得少于 ___ MΩ。',
            answers: ['0.5', '0.5MΩ'],
            explanation: '1kV 电缆绝缘电阻 ≥ 0.5MΩ。'
        }, {
            id: 16,
            question: '电力工作票的有效期不得超过 ___ 个工作日。',
            answers: ['3', '3个'],
            explanation: '电力工作票有效期 ≤ 3 个工作日。'
        }, {
            id: 17,
            question: '接地线应用多股软铜线，导线截面积应符合短路电流要求，不得小于 ___ mm²。',
            answers: ['25', '25mm²'],
            explanation: '接地线截面 ≥ 25mm²。'
        }];

        const choiceData = [{

        // ============================================================

        let allQuestions = [];
        let isGlobalSubmitted = false;

        function buildQuestions() {
            const qs = [];
            fillData.forEach(item => {
                qs.push({
                    type: 'fill',
                    id: item.id,
                    displayId: `F${item.id}`,
                    data: item,
                    userAnswer: '',
                    status: 'pending' // pending | correct | wrong
                });
            });
            choiceData.forEach(item => {
                qs.push({
                    type: 'choice',
                    id: item.id,
                    displayId: `C${item.id}`,
                    data: item,
                    userAnswer: null,
                    status: 'pending'
                });
            });
            judgeData.forEach(item => {
                qs.push({
                    type: 'judge',
                    id: item.id,
                    displayId: `J${item.id}`,
                    data: item,
                    userAnswer: null,
                    status: 'pending'
                });
            });
            return qs;
        }

        allQuestions = buildQuestions();
        const initialQuestions = JSON.parse(JSON.stringify(allQuestions));

        // DOM refs
        const container = document.getElementById('questionsContainer');
        const totalCountEl = document.getElementById('totalCount');
        const doneCountEl = document.getElementById('doneCount');
        const wrongCountEl = document.getElementById('wrongCount');
        const pendingCountEl = document.getElementById('pendingCount');
        const scoreNumEl = document.getElementById('scoreNum');
        const totalScoreEl = document.getElementById('totalScore');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const toastEl = document.getElementById('toast');

        let toastTimer = null;

        // ============================================================
        //  工具函数
        // ============================================================

        function showToast(msg, duration = 2800) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
            }, duration);
        }

        function calculateCorrectness(q) {
            const data = q.data;
            if (q.type === 'fill') {
                const userAns = (q.userAnswer || '').trim();
                if (!userAns) return false;
                const normalizedUser = userAns.replace(/\s/g, '').toLowerCase();
                // 直接匹配
                for (let ans of data.answers) {
                    const normAns = ans.replace(/\s/g, '').toLowerCase();
                    if (normalizedUser === normAns || normalizedUser.includes(normAns) || normAns.includes(
                            normalizedUser)) {
                        return true;
                    }
                }
                // 数字模糊匹配
                const numUser = parseFloat(userAns);
                if (!isNaN(numUser)) {
                    for (let ans of data.answers) {
                        const numAns = parseFloat(ans);
                        if (!isNaN(numAns) && Math.abs(numUser - numAns) < 0.01) return true;
                    }
                }
                // 括号内匹配
                for (let ans of data.answers) {
                    const match = ans.match(/[（(]([^）)]+)[）)]/);
                    if (match) {
                        const inner = match[1];
                        if (userAns.includes(inner) || inner.includes(userAns)) return true;
                    }
                }
                return false;
            } else if (q.type === 'choice') {
                return q.userAnswer === data.answer;
            } else if (q.type === 'judge') {
                return q.userAnswer === data.answer;
            }
            return false;
        }

        function getAnswered(q) {
            if (q.type === 'fill') {
                return q.userAnswer && q.userAnswer.trim().length > 0;
            } else {
                return q.userAnswer !== null && q.userAnswer !== undefined;
            }
        }

        // ============================================================
        //  统计 & 分数
        // ============================================================

        function updateStats() {
            const total = allQuestions.length;
            let done = 0,
                wrong = 0,
                pending = 0;
            allQuestions.forEach(q => {
                if (getAnswered(q)) {
                    done++;
                    if (q.status === 'wrong') wrong++;
                } else {
                    pending++;
                }
            });
            totalCountEl.textContent = total;
            doneCountEl.textContent = done;
            wrongCountEl.textContent = wrong;
            pendingCountEl.textContent = pending;
        }

        function updateScore() {
            let correct = 0;
            allQuestions.forEach(q => {
                if (q.status === 'correct') correct++;
            });
            scoreNumEl.textContent = correct;
            totalScoreEl.textContent = allQuestions.length;
        }

        // ============================================================
        //  单题提交
        // ============================================================

        function submitSingle(index) {
            const q = allQuestions[index];
            if (!q) return;
            if (q.status === 'correct' || q.status === 'wrong') {
                showToast('这道题已经提交过了', 1500);
                return;
            }

            // 检查是否作答
            if (!getAnswered(q)) {
                if (q.type === 'fill') {
                    showToast('✏️ 请先填写答案', 1500);
                } else {
                    showToast('👆 请先选择一个选项', 1500);
                }
                // 高亮卡片
                const cards = document.querySelectorAll('.q-card');
                cards.forEach(card => {
                    if (parseInt(card.dataset.index) === index) {
                        card.classList.add('missing');
                        setTimeout(() => card.classList.remove('missing'), 2000);
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                return;
            }

            const isCorrect = calculateCorrectness(q);
            q.status = isCorrect ? 'correct' : 'wrong';

            // 重新渲染该卡片（或全量渲染）
            render();

            // 滚动到该卡片并闪烁反馈
            const cards = document.querySelectorAll('.q-card');
            cards.forEach(card => {
                if (parseInt(card.dataset.index) === index) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.style.transition = 'background 0.3s';
                    card.style.background = isCorrect ? '#f0fdf4' : '#fef2f2';
                    setTimeout(() => card.style.background = '', 1200);
                }
            });

            showToast(isCorrect ? '✅ 回答正确！' : '❌ 回答错误，查看解析', 2000);
            updateStats();
            updateScore();

            // 检查是否全部答完
            const allDone = allQuestions.every(q => q.status === 'correct' || q.status === 'wrong');
            if (allDone) {
                const correct = allQuestions.filter(q => q.status === 'correct').length;
                const total = allQuestions.length;
                const pct = Math.round((correct / total) * 100);
                let emoji = pct >= 90 ? '🏆 太棒了！' : pct >= 70 ? '👍 不错！' : '💪 继续加油！';
                showToast(`🎉 全部完成！得分 ${correct}/${total}（${pct}%） ${emoji}`, 4000);
                submitBtn.disabled = true;
                submitBtn.textContent = '✅ 全部已答';
            }
        }

        // ============================================================
        //  全局提交
        // ============================================================

        function submitAllRemaining() {
            // 检查是否有未答的
            const missingIndices = [];
            allQuestions.forEach((q, idx) => {
                if (q.status === 'pending' && !getAnswered(q)) {
                    missingIndices.push(idx);
                }
            });

            if (missingIndices.length > 0) {
                // 高亮缺失
                document.querySelectorAll('.q-card.missing').forEach(el => el.classList.remove('missing'));
                missingIndices.forEach(idx => {
                    const cards = document.querySelectorAll('.q-card');
                    cards.forEach(card => {
                        if (parseInt(card.dataset.index) === idx) {
                            card.classList.add('missing');
                            if (missingIndices[0] === idx) {
                                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    });
                });
                showToast(`⚠️ 还有 ${missingIndices.length} 道题未作答`, 2800);
                return;
            }

            // 提交所有 pending 题目
            let anySubmitted = false;
            allQuestions.forEach((q, idx) => {
                if (q.status === 'pending') {
                    const isCorrect = calculateCorrectness(q);
                    q.status = isCorrect ? 'correct' : 'wrong';
                    anySubmitted = true;
                }
            });

            if (!anySubmitted) {
                showToast('📌 所有题目都已经提交过了', 2000);
                return;
            }

            render();
            const correct = allQuestions.filter(q => q.status === 'correct').length;
            const total = allQuestions.length;
            const pct = Math.round((correct / total) * 100);
            let emoji = pct >= 90 ? '🏆 优秀！' : pct >= 70 ? '👍 不错！' : '💪 继续加油！';
            showToast(`📊 提交完成！得分 ${correct}/${total}（${pct}%） ${emoji}`, 4000);
            updateStats();
            updateScore();
            submitBtn.disabled = true;
            submitBtn.textContent = '✅ 全部已答';
            isGlobalSubmitted = true;
        }

        // ============================================================
        //  渲染
        // ============================================================

        function render() {
            container.innerHTML = '';
            const total = allQuestions.length;

            const fillItems = allQuestions.filter(q => q.type === 'fill');
            const choiceItems = allQuestions.filter(q => q.type === 'choice');
            const judgeItems = allQuestions.filter(q => q.type === 'judge');

            if (fillItems.length) {
                const sec = createSection('📝 填空题', 'fill', fillItems.length);
                container.appendChild(sec);
                fillItems.forEach((q, idx) => {
                    const card = createFillCard(q, allQuestions.indexOf(q));
                    sec.appendChild(card);
                });
            }

            if (choiceItems.length) {
                const sec = createSection('🔘 单选题', 'choice', choiceItems.length);
                container.appendChild(sec);
                choiceItems.forEach((q, idx) => {
                    const card = createChoiceCard(q, allQuestions.indexOf(q));
                    sec.appendChild(card);
                });
            }

            if (judgeItems.length) {
                const sec = createSection('⚖️ 判断题', 'judge', judgeItems.length);
                container.appendChild(sec);
                judgeItems.forEach((q, idx) => {
                    const card = createJudgeCard(q, allQuestions.indexOf(q));
                    sec.appendChild(card);
                });
            }

            // 更新统计
            updateStats();
            updateScore();

            // 如果全部已提交，禁用全局按钮
            const allDone = allQuestions.every(q => q.status === 'correct' || q.status === 'wrong');
            if (allDone) {
                submitBtn.disabled = true;
                submitBtn.textContent = '✅ 全部已答';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = '📨 提交全部未答题';
            }
        }

        function createSection(title, type, count) {
            const div = document.createElement('div');
            const badgeMap = { fill: 'fill', choice: 'choice', judge: 'judge' };
            div.innerHTML = `
                <div class="section-title">
                    ${title}
                    <span class="badge ${badgeMap[type] || ''}">${count} 题</span>
                </div>
            `;
            return div.firstElementChild ? div.firstElementChild.parentNode : div;
        }

        // ----- 填空题卡片 -----
        function createFillCard(q, globalIdx) {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.dataset.index = globalIdx;
            card.dataset.type = 'fill';

            const data = q.data;
            const parts = data.question.split('___');
            const qText = parts.length === 2 ?
                `${parts[0]}<span class="fill-wrap"><input class="fill-input" type="text" placeholder="填写答案" data-qidx="${globalIdx}" value="${q.userAnswer || ''}" ${q.status !== 'pending' ? 'disabled' : ''}></span>${parts[1]}` :
                data.question.replace('___', `<span class="fill-wrap"><input class="fill-input" type="text" placeholder="填写答案" data-qidx="${globalIdx}" value="${q.userAnswer || ''}" ${q.status !== 'pending' ? 'disabled' : ''}></span>`);

            const isSubmitted = q.status !== 'pending';
            const statusHtml = isSubmitted ?
                `<span class="status-badge ${q.status}">${q.status === 'correct' ? '✅ 正确' : '❌ 错误'}</span>` :
                '';

            card.innerHTML = `
                <div class="q-header">
                    <span class="q-number">${q.displayId}</span>
                    <span class="q-text">${qText}</span>
                </div>
                <div class="single-actions">
                    ${!isSubmitted ? `<button class="btn-confirm-single" data-qidx="${globalIdx}"><span class="icon">✔️</span> 确认答案</button>` : ''}
                    ${statusHtml}
                </div>
                <div class="explanation ${isSubmitted ? 'show' : ''}" id="exp-${globalIdx}">
                    <span class="exp-label">📖 解析：</span>
                    <span class="exp-text">${data.explanation}</span>
                    <br><span class="exp-label">✅ 参考答案：</span>
                    <span class="exp-answer ${q.status === 'correct' ? 'correct-ans' : q.status === 'wrong' ? 'wrong-ans' : ''}">${data.answers.join(' 或 ')}</span>
                </div>
            `;

            const input = card.querySelector('.fill-input');
            if (input) {
                input.addEventListener('input', function(e) {
                    if (this.disabled) return;
                    const idx = parseInt(this.dataset.qidx);
                    allQuestions[idx].userAnswer = this.value;
                    // 清除高亮
                    card.classList.remove('missing');
                    updateStats();
                    updateScore();
                });
                // 如果已提交，添加样式
                if (q.status === 'correct') input.classList.add('correct');
                if (q.status === 'wrong') input.classList.add('wrong');
            }

            const btn = card.querySelector('.btn-confirm-single');
            if (btn) {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.qidx);
                    submitSingle(idx);
                });
            }

            return card;
        }

        // ----- 单选题卡片 -----
        function createChoiceCard(q, globalIdx) {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.dataset.index = globalIdx;
            card.dataset.type = 'choice';

            const data = q.data;
            const isSubmitted = q.status !== 'pending';
            const labels = ['A', 'B', 'C', 'D'];

            let optionsHtml = '';
            data.options.forEach((opt, oi) => {
                let cls = 'opt';
                if (isSubmitted) {
                    cls += ' disabled';
                    if (oi === data.answer) cls += ' correct';
                    if (q.status === 'wrong' && oi === q.userAnswer && oi !== data.answer) cls += ' wrong';
                    if (oi === q.userAnswer) cls += ' selected';
                } else {
                    if (q.userAnswer === oi) cls += ' selected';
                }
                optionsHtml += `<span class="${cls}" data-optidx="${oi}" data-qidx="${globalIdx}">${opt}</span>`;
            });

            const statusHtml = isSubmitted ?
                `<span class="status-badge ${q.status}">${q.status === 'correct' ? '✅ 正确' : '❌ 错误'}</span>` :
                '';

            card.innerHTML = `
                <div class="q-header">
                    <span class="q-number">${q.displayId}</span>
                    <span class="q-text">${data.question}</span>
                </div>
                <div class="options">${optionsHtml}</div>
                <div class="single-actions">
                    ${statusHtml}
                </div>
                <div class="explanation ${isSubmitted ? 'show' : ''}" id="exp-${globalIdx}">
                    <span class="exp-label">📖 解析：</span>
                    <span class="exp-text">${data.explanation}</span>
                    <br><span class="exp-label">✅ 正确答案：</span>
                    <span class="exp-answer ${q.status === 'correct' ? 'correct-ans' : q.status === 'wrong' ? 'wrong-ans' : ''}">${data.options[data.answer]}</span>
                </div>
            `;

            if (!isSubmitted) {
                const optEls = card.querySelectorAll('.opt');
                optEls.forEach(el => {
                    el.addEventListener('click', function() {
                        if (this.classList.contains('disabled')) return;
                        const idx = parseInt(this.dataset.qidx);
                        const oi = parseInt(this.dataset.optidx);
                        // 选中
                        const parent = this.parentElement;
                        parent.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                        allQuestions[idx].userAnswer = oi;
                        card.classList.remove('missing');
                        updateStats();
                        updateScore();
                        // 自动提交该题（选择题点击即提交）
                        submitSingle(idx);
                    });
                });
            }

            return card;
        }

        // ----- 判断题卡片 -----
        function createJudgeCard(q, globalIdx) {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.dataset.index = globalIdx;
            card.dataset.type = 'judge';

            const data = q.data;
            const isSubmitted = q.status !== 'pending';
            const userVal = q.userAnswer;

            let trueCls = 'jbtn';
            let falseCls = 'jbtn';
            if (isSubmitted) {
                trueCls += ' disabled';
                falseCls += ' disabled';
                if (data.answer === true) trueCls += ' correct';
                else falseCls += ' correct';
                if (q.status === 'wrong') {
                    if (userVal === true && data.answer !== true) trueCls += ' wrong';
                    if (userVal === false && data.answer !== false) falseCls += ' wrong';
                }
                if (userVal === true) trueCls += ' selected-true';
                if (userVal === false) falseCls += ' selected-false';
            } else {
                if (userVal === true) trueCls += ' selected-true';
                if (userVal === false) falseCls += ' selected-false';
            }
            trueCls = trueCls.trim();
            falseCls = falseCls.trim();

            const statusHtml = isSubmitted ?
                `<span class="status-badge ${q.status}">${q.status === 'correct' ? '✅ 正确' : '❌ 错误'}</span>` :
                '';

            card.innerHTML = `
                <div class="q-header">
                    <span class="q-number">${q.displayId}</span>
                    <span class="q-text">${data.question}</span>
                </div>
                <div class="judge-btns">
                    <span class="${trueCls}" data-val="true" data-qidx="${globalIdx}"><span class="icon">✅</span> 正确</span>
                    <span class="${falseCls}" data-val="false" data-qidx="${globalIdx}"><span class="icon">❌</span> 错误</span>
                </div>
                <div class="single-actions">
                    ${statusHtml}
                </div>
                <div class="explanation ${isSubmitted ? 'show' : ''}" id="exp-${globalIdx}">
                    <span class="exp-label">📖 解析：</span>
                    <span class="exp-text">${data.explanation}</span>
                    <br><span class="exp-label">✅ 正确答案：</span>
                    <span class="exp-answer ${q.status === 'correct' ? 'correct-ans' : q.status === 'wrong' ? 'wrong-ans' : ''}">${data.answer ? '正确 ✅' : '错误 ❌'}</span>
                </div>
            `;

            if (!isSubmitted) {
                const btns = card.querySelectorAll('.jbtn');
                btns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        if (this.classList.contains('disabled')) return;
                        const idx = parseInt(this.dataset.qidx);
                        const val = this.dataset.val === 'true';
                        // 取消同组选中
                        const parent = this.parentElement;
                        parent.querySelectorAll('.jbtn').forEach(b => {
                            b.classList.remove('selected-true', 'selected-false');
                        });
                        if (val === true) this.classList.add('selected-true');
                        else this.classList.add('selected-false');
                        allQuestions[idx].userAnswer = val;
                        card.classList.remove('missing');
                        updateStats();
                        updateScore();
                        // 自动提交（判断题点击即提交）
                        submitSingle(idx);
                    });
                });
            }

            return card;
        }

        // ============================================================
        //  重置
        // ============================================================

        function resetAll() {
            allQuestions = JSON.parse(JSON.stringify(initialQuestions));
            isGlobalSubmitted = false;
            submitBtn.disabled = false;
            submitBtn.textContent = '📨 提交全部未答题';
            render();
            showToast('🔄 已重置，重新练习吧！', 2000);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        //  事件绑定 & 初始化
        // ============================================================

        submitBtn.addEventListener('click', submitAllRemaining);
        resetBtn.addEventListener('click', resetAll);

        render();
        console.log('⚡ 电力安规逐题练习 · 由沐春风制作');
    </script>
</body>
